name: Build installers

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build
        required: true
        default: v0.1.0-alpha
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux x64
            os: ubuntu-24.04
            targets: x86_64-unknown-linux-gnu
            args: --config src-tauri/tauri.release.conf.json
            checksum: linux-x64
            checksum_pattern: '(\.AppImage|\.deb|\.rpm)$'
          - platform: macOS Universal
            os: macos-14
            targets: x86_64-apple-darwin,aarch64-apple-darwin
            args: --target universal-apple-darwin --config src-tauri/tauri.release.conf.json
            checksum: macos-universal
            checksum_pattern: '(\.dmg|\.app\.tar\.gz)$'
          - platform: Windows x64
            os: windows-2022
            targets: x86_64-pc-windows-msvc
            args: --bundles nsis --config src-tauri/tauri.release.conf.json
            checksum: windows-x64
            checksum_pattern: '\.exe$'
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.targets }}
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          libc++-dev libc++abi-dev
      - run: npm ci
      - id: tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TELEVAULT_UPDATE_PUBLIC_KEY: configured
          TELEVAULT_UPDATE_ENDPOINT: https://github.com/H34TB145T/TeleVault/releases/latest/download/latest.json
        with:
          args: ${{ matrix.args }}
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: TeleVault ${{ inputs.tag || github.ref_name }}
          releaseBody: |
            TeleVault is alpha software. Back up your recovery key and test with non-critical files first.

            These builds are not Apple-notarized or commercially code-signed. Follow the unsigned installation instructions in the README and verify the published SHA-256 checksums.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          updaterJsonKeepUniversal: true
      - name: Generate and upload SHA-256 checksums
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
          ASSET_PATTERN: ${{ matrix.checksum_pattern }}
        run: |
          $release = gh api "repos/H34TB145T/TeleVault/releases/tags/$env:RELEASE_TAG" | ConvertFrom-Json
          $assets = $release.assets | Where-Object {
            $_.name -match $env:ASSET_PATTERN -and -not $_.name.EndsWith('.sig')
          }
          if (-not $assets) { throw 'No uploaded installer assets were found for checksums.' }
          $lines = $assets | Sort-Object name | ForEach-Object {
            if (-not $_.digest -or -not $_.digest.StartsWith('sha256:')) {
              throw "GitHub did not report a SHA-256 digest for $($_.name)."
            }
            "$($_.digest.Substring(7))  $($_.name)"
          }
          $checksumFile = "SHA256SUMS-${{ matrix.checksum }}.txt"
          $lines | Set-Content -Encoding utf8 $checksumFile
          gh release upload $env:RELEASE_TAG $checksumFile --repo H34TB145T/TeleVault --clobber

  publish:
    name: Publish verified release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Publish release after all installers succeed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: >-
          gh release edit "$RELEASE_TAG" --repo H34TB145T/TeleVault
          --draft=false --prerelease=false
